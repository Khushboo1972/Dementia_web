<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Registration - Shallion Dementia Support</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --color-primary: #61251a;
    --color-primary-dark: #3f140e;
    --color-bg: #F7F7F7;
    --color-text: #0B0B0B;
    --color-success: #2F855A;
    --color-error: #E53E3E;
    --spacing-1: 8px;
    --spacing-2: 16px;
    --spacing-3: 24px;
    --spacing-4: 32px;
    --border-radius: 8px;
    --card-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

body {
    font-family: 'Montserrat', sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    line-height: 1.5;
    margin: 0;
}

a {
    text-decoration: none;
    color: var(--color-primary);
}

a:hover {
    text-decoration: underline;
}

.auth-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--spacing-4) var(--spacing-2);
}

.auth-box {
    background: white;
    border-radius: var(--border-radius);
    box-shadow: var(--card-shadow);
    padding: var(--spacing-4);
    width: 100%;
    max-width: 500px;
    animation: slideUp 0.5s ease;
}

@keyframes slideUp {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

.auth-header {
    text-align: center;
    margin-bottom: var(--spacing-4);
}

.auth-header h2 {
    font-family: 'Libre Baskerville', serif;
    color: var(--color-primary);
    text-transform: uppercase;
    font-size: 28px;
    margin-bottom: var(--spacing-1);
}

.auth-header p {
    color: #7f8c8d;
    font-size: 16px;
}

.tabs {
    display: flex;
    margin-bottom: var(--spacing-4);
    border-radius: var(--border-radius);
    overflow: hidden;
    border: 2px solid #e0e0e0;
}

.tab-btn {
    flex: 1;
    padding: var(--spacing-1);
    background: white;
    border: none;
    font-size: 16px;
    font-weight: 600;
    color: #7f8c8d;
    cursor: pointer;
    transition: all 0.3s ease;
}

.tab-btn:hover {
    background: #f8f9fa;
}

.tab-btn.active {
    background: var(--color-primary);
    color: white;
}

.form-group {
    margin-bottom: var(--spacing-3);
}

.form-group label {
    display: block;
    margin-bottom: var(--spacing-1);
    font-weight: 600;
    color: var(--color-text);
    font-size: 14px;
}

.form-control {
    width: 100%;
    padding: var(--spacing-2);
    border: 2px solid #e0e0e0;
    border-radius: var(--border-radius);
    font-size: 16px;
    transition: all 0.3s ease;
}

.form-control:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(97, 37, 26, 0.2);
}

.checkbox-group {
    display: flex;
    align-items: center;
    gap: var(--spacing-2);
    margin-bottom: var(--spacing-3);
    padding: var(--spacing-2);
    background: #f8f9fa;
    border-radius: var(--border-radius);
}

.checkbox-group input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
}

.checkbox-group label {
    margin: 0;
    cursor: pointer;
    font-size: 14px;
}

.btn {
    display: inline-block;
    width: 100%;
    padding: var(--spacing-2);
    border: none;
    border-radius: var(--border-radius);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
}

.btn-primary {
    background: var(--color-primary);
    color: white;
}

.btn-primary:hover {
    background: var(--color-primary-dark);
}

.btn-outline {
    background: white;
    color: var(--color-text);
    border: 2px solid #e0e0e0;
}

.btn-outline:hover {
    background: #f8f9fa;
    border-color: var(--color-primary);
}

.error-message {
    color: var(--color-error);
    font-size: 14px;
    margin-top: 5px;
}

.form-control.error {
    border-color: var(--color-error);
    background: #fff5f5;
}

.alert {
    padding: var(--spacing-2);
    border-radius: var(--border-radius);
    margin-bottom: var(--spacing-3);
}

.alert-error {
    background: #fff5f5;
    border: 2px solid var(--color-error);
    color: var(--color-error);
}

.alert-success {
    background: #f0fff4;
    border: 2px solid var(--color-success);
    color: var(--color-success);
}

.password-requirements {
    background: #f8f9fa;
    border-radius: var(--border-radius);
    padding: var(--spacing-2);
    margin-top: var(--spacing-1);
    font-size: 14px;
}

.password-requirements li::before {
    content: '○';
    color: #95a5a6;
}

.password-requirements li.valid::before {
    content: '✓';
    color: var(--color-success);
}

.password-requirements li.invalid::before {
    content: '○';
    color: #95a5a6;
}

.pvg-info {
    font-size: 12px;
    color: #7f8c8d;
    font-style: italic;
    margin-top: 4px;
}

.auth-switch {
    text-align: center;
    margin-top: var(--spacing-3);
    padding-top: var(--spacing-3);
    border-top: 1px solid #e0e0e0;
}

.auth-switch a {
    color: var(--color-primary);
    font-weight: 600;
}

.form-control:focus, .btn:focus {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
}
</style>
</head>
<body>

<div class="auth-container" role="main">
    <div class="auth-box" role="region" aria-label="Volunteer Registration Form">
        <div class="auth-header">
            <h2>Volunteer Registration</h2>
            <p>Join our community of volunteers</p>
        </div>

        <div class="tabs" role="tablist">
            <button class="tab-btn" data-tab="login" role="tab" aria-selected="false">Login</button>
            <button class="tab-btn active" data-tab="register" role="tab" aria-selected="true">Register</button>
        </div>

        <form id="register-form" aria-label="Volunteer Registration">
            <div class="form-group">
                <label for="full_name">Full Name:</label>
                <input type="text" id="full_name" class="form-control" placeholder="Enter your full name" required>
                <div class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                <div class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" class="form-control" placeholder="Enter your phone number">
                <div class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="password1">Create Password:</label>
                <input type="password" id="password1" class="form-control" placeholder="Enter password" required>
                <div class="password-requirements">
                    <ul>
                        <li class="password-requirement" data-requirement="length">At least 8 characters</li>
                        <li class="password-requirement" data-requirement="uppercase">One uppercase letter</li>
                        <li class="password-requirement" data-requirement="lowercase">One lowercase letter</li>
                        <li class="password-requirement" data-requirement="number">One number</li>
                        <li class="password-requirement" data-requirement="special">One special character</li>
                    </ul>
                </div>
            </div>

            <div class="form-group">
                <label for="password2">Confirm Password:</label>
                <input type="password" id="password2" class="form-control" placeholder="Confirm password" required>
                <div class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="pvg_number">PVG Number:</label>
                <input type="text" id="pvg_number" class="form-control" placeholder="Enter your PVG number" required>
                <div class="pvg-info">(Protecting Vulnerable Groups)</div>
                <div class="error-message"></div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms_accepted" required>
                <label for="terms_accepted">I agree to Volunteer Terms & Conditions and Code of Conduct</label>
            </div>

            <button type="submit" class="btn btn-primary">Register as Volunteer</button>
            <button type="button" class="btn btn-outline" id="cancel-btn">Cancel</button>

            <div class="auth-switch">
                <p>Already have an account? <a href="#">Login here</a></p>
            </div>
        </form>

        <form id="login-form" style="display:none;">
            <button type="button" class="btn btn-primary">Go to Login Page</button>
        </form>
    </div>
</div>

<script>
// Tab Switching
const tabButtons = document.querySelectorAll('.tab-btn');
const loginForm = document.getElementById('login-form');
const registerForm = document.getElementById('register-form');

tabButtons.forEach(button => {
    button.addEventListener('click', function() {
        tabButtons.forEach(btn => btn.classList.remove('active'));
        this.classList.add('active');
        if(this.dataset.tab === 'login'){
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
        } else {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
        }
    });
});

// Password Strength Checker
const passwordInput = document.getElementById('password1');
const confirmPasswordInput = document.getElementById('password2');
const requirements = document.querySelectorAll('.password-requirement');

function checkPasswordStrength(password) {
    return {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        number: /\d/.test(password),
        special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
    };
}

passwordInput.addEventListener('input', function() {
    const password = this.value;
    const reqs = checkPasswordStrength(password);
    requirements.forEach(el => {
        const r = el.dataset.requirement;
        if(reqs[r]){
            el.classList.add('valid');
            el.classList.remove('invalid');
        } else {
            el.classList.add('invalid');
            el.classList.remove('valid');
        }
    });
});

confirmPasswordInput.addEventListener('input', function() {
    if(this.value && this.value !== passwordInput.value){
        this.classList.add('error');
        this.nextElementSibling.textContent = 'Passwords do not match';
    } else {
        this.classList.remove('error');
        this.nextElementSibling.textContent = '';
    }
});

// Form Validation
registerForm.addEventListener('submit', function(e){
    let valid = true;
    [passwordInput, confirmPasswordInput, document.getElementById('full_name'), document.getElementById('email'), document.getElementById('pvg_number')].forEach(input=>{
        input.classList.remove('error');
        if(!input.value.trim()){
            input.classList.add('error');
            valid = false;
        }
    });
    if(document.getElementById('terms_accepted').checked === false){
        alert('You must accept the Volunteer Terms & Conditions and Code of Conduct');
        valid = false;
    }
    if(!valid) e.preventDefault();
});

// Cancel Button
document.getElementById('cancel-btn').addEventListener('click', function(){
    registerForm.reset();
});
</script>

</body>
</html>
