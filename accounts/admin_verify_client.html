<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Client | Shallion Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">

<style>

/* ================================
   DESIGN TOKENS (Shallion Brand)
================================ */

:root{

--primary:#61251A;
--primary-dark:#3F140E;
--background:#F7F7F7;
--text:#0B0B0B;

--success:#2F855A;
--error:#E53E3E;

--radius:8px;
--shadow:0 2px 8px rgba(0,0,0,0.06);

--space-1:8px;
--space-2:16px;
--space-3:24px;
--space-4:32px;

--max-width:1200px;

}

/* ================================
GLOBAL
================================ */

body{
margin:0;
font-family:Montserrat,sans-serif;
background:var(--background);
color:var(--text);
font-size:16px;
line-height:1.5;
}

h1,h2,h3{
font-family:"Libre Baskerville",serif;
margin-top:0;
}

.container{
max-width:var(--max-width);
margin:auto;
padding:var(--space-4) var(--space-2);
}

/* ================================
NAVBAR
================================ */

.navbar{
background:white;
border-bottom:1px solid #ddd;
}

.nav-inner{
max-width:var(--max-width);
margin:auto;
padding:var(--space-2);
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
font-family:"Libre Baskerville",serif;
font-weight:700;
letter-spacing:1px;
}

.nav-links a{
margin-left:var(--space-2);
text-decoration:none;
color:var(--primary);
font-weight:600;
}

/* ================================
BACK LINK
================================ */

.back-link{
display:inline-block;
margin-bottom:var(--space-3);
color:var(--primary);
text-decoration:none;
font-weight:600;
}

/* ================================
CARD
================================ */

.card{
background:white;
padding:var(--space-4);
border-radius:var(--radius);
box-shadow:var(--shadow);
}

/* ================================
INFO
================================ */

.info p{
margin:6px 0;
}

.certificate{
margin-top:var(--space-2);
padding:var(--space-2);
background:#fafafa;
border-radius:var(--radius);
}

/* ================================
BUTTONS
================================ */

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:12px 20px;
border-radius:var(--radius);
border:none;
font-weight:600;
cursor:pointer;
font-size:14px;
min-height:44px;
text-decoration:none;
}

.btn-primary{
background:var(--primary);
color:white;
}

.btn-primary:hover{
background:var(--primary-dark);
}

.btn-success{
background:var(--success);
color:white;
}

.btn-outline{
background:white;
border:2px solid var(--primary);
color:var(--primary);
}

.btn-outline:hover{
background:var(--primary);
color:white;
}

/* ================================
FORM
================================ */

.form-group{
margin-bottom:var(--space-3);
}

textarea{
width:100%;
padding:12px;
border-radius:var(--radius);
border:2px solid #ddd;
font-family:inherit;
font-size:16px;
resize:vertical;
}

textarea:focus{
outline:none;
border-color:var(--primary);
}

.form-actions{
display:flex;
gap:12px;
flex-wrap:wrap;
}

/* ================================
ALERT
================================ */

.warning{
background:#fff3cd;
padding:12px;
border-radius:var(--radius);
margin-top:12px;
}

/* ================================
RESPONSIVE
================================ */

@media(max-width:768px){

.nav-inner{
flex-direction:column;
align-items:flex-start;
}

.form-actions{
flex-direction:column;
}

}

</style>
</head>


<body>

<!-- NAVBAR -->

<header class="navbar">

<div class="nav-inner">

<div class="logo">SHALLION</div>

<div class="nav-links">
<a href="#">Dashboard</a>
<a href="#">Clients</a>
<a href="#">Volunteers</a>
</div>

</div>

</header>


<!-- MAIN CONTENT -->

<main class="container">

<a href="#" class="back-link">← Back to Client</a>

<div class="card">

<h1>Verify Client</h1>

<div class="info">

<p><strong>Client:</strong> Alice Smith</p>
<p><strong>Email:</strong> alice@email.com</p>
<p><strong>Registered:</strong> 12 March 2025</p>

<div class="certificate">

<h3>GP Certificate</h3>

<a href="#" class="btn btn-primary" target="_blank">
View Certificate
</a>

<p><small>File: gp_certificate_alice.pdf</small></p>

</div>

</div>


<form id="verificationForm">

<div class="form-group">

<label>
<input type="checkbox" id="confirmCheck">
I confirm that the GP certificate has been reviewed and is valid
</label>

</div>


<div class="form-group">

<label for="notes">Notes (Optional)</label>

<textarea id="notes" rows="4" placeholder="Add any notes about this verification..."></textarea>

</div>


<div class="form-actions">

<button type="submit" class="btn btn-success">
✓ Verify Client
</button>

<button type="button" class="btn btn-outline" onclick="goBack()">
Cancel
</button>

</div>

</form>

</div>

</main>


<script>

/* ============================
FORM VALIDATION
============================ */

document.getElementById("verificationForm")
.addEventListener("submit",function(e){

const confirmed=document.getElementById("confirmCheck").checked

if(!confirmed){

e.preventDefault()

alert("Please confirm the certificate has been reviewed.")

}

else{

alert("Client verified successfully (demo).")

}

})


/* ============================
BACK BUTTON
============================ */

function goBack(){

window.history.back()

}

</script>

</body>
</html>
