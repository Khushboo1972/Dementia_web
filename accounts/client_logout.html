<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Logged Out | Shallion Dementia Support</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">

<style>

/* =========================
DESIGN SYSTEM
========================= */

:root{
--primary:#61251A;
--primary-dark:#3F140E;
--background:#F7F7F7;
--text:#0B0B0B;

--success:#2F855A;
--radius:10px;

--space-1:8px;
--space-2:16px;
--space-3:24px;
--space-4:32px;

--shadow:0 15px 50px rgba(0,0,0,0.25);
}

/* =========================
GLOBAL
========================= */

body{
margin:0;
font-family:Montserrat,sans-serif;
background:var(--background);
color:var(--text);
}

h1,h2,h3{
font-family:"Libre Baskerville",serif;
margin-top:0;
}

/* =========================
CONTAINER
========================= */

.logout-container{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px 20px;
background:linear-gradient(135deg,var(--primary),var(--primary-dark));
}

/* =========================
LOGOUT BOX
========================= */

.logout-box{
background:white;
border-radius:var(--radius);
padding:40px;
max-width:500px;
width:100%;
text-align:center;
box-shadow:var(--shadow);
animation:fadeIn .5s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}

/* =========================
ICON
========================= */

.logout-icon{
font-size:60px;
margin-bottom:20px;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-10px)}
}

/* =========================
TEXT
========================= */

.logout-box h1{
font-size:30px;
margin-bottom:10px;
}

.logout-box p{
color:#666;
font-size:17px;
margin-bottom:20px;
}

/* =========================
BUTTONS
========================= */

.btn-container{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
margin-top:20px;
}

.btn{
padding:12px 28px;
border-radius:8px;
font-weight:600;
text-decoration:none;
display:inline-block;
min-width:150px;
transition:.3s;
}

.btn-primary{
background:var(--primary);
color:white;
}

.btn-primary:hover{
background:var(--primary-dark);
transform:translateY(-2px);
}

.btn-outline{
border:2px solid var(--primary);
color:var(--primary);
background:white;
}

.btn-outline:hover{
background:var(--primary);
color:white;
}

/* =========================
LOGIN OPTIONS
========================= */

.login-options{
margin-top:35px;
border-top:1px solid #eee;
padding-top:25px;
}

.login-options h3{
margin-bottom:15px;
}

.login-buttons{
display:flex;
flex-direction:column;
gap:10px;
}

.login-btn{
padding:10px;
border-radius:6px;
text-decoration:none;
color:white;
font-weight:600;
transition:.3s;
}

.login-client{
background:var(--primary);
}

.login-volunteer{
background:var(--success);
}

.login-admin{
background:#333;
}

.login-btn:hover{
transform:translateY(-2px);
}

/* =========================
AUTO REDIRECT
========================= */

.auto-redirect{
margin-top:20px;
font-size:14px;
color:#777;
}

#countdown{
font-weight:600;
color:var(--primary);
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:576px){

.logout-box{
padding:30px 20px;
}

.btn-container{
flex-direction:column;
align-items:center;
}

.btn{
width:100%;
max-width:280px;
}

}

</style>
</head>


<body>

<div class="logout-container">

<div class="logout-box">

<div class="logout-icon">👋</div>

<h1>Successfully Logged Out</h1>

<p>You have been logged out of your account.</p>
<p>Thank you for using Shallion Dementia Support.</p>

<div class="btn-container">

<a href="#" class="btn btn-primary">Return to Homepage</a>

<a href="#" class="btn btn-outline">Learn More About Us</a>

</div>

<div class="login-options">

<h3>Login Again As:</h3>

<div class="login-buttons">

<a href="#" class="login-btn login-client">Client</a>

<a href="#" class="login-btn login-volunteer">Volunteer</a>

<a href="#" class="login-btn login-admin">Administrator</a>

</div>

</div>

<div class="auto-redirect">

<p>Redirecting to homepage in <span id="countdown">10</span> seconds...</p>

</div>

</div>

</div>


<script>

/* =========================
AUTO REDIRECT
========================= */

let seconds=10

const countdown=document.getElementById("countdown")

const interval=setInterval(()=>{

seconds--

countdown.textContent=seconds

if(seconds<=0){

clearInterval(interval)

window.location.href="#"

}

},1000)

/* =========================
STOP REDIRECT IF USER CLICKS
========================= */

document.addEventListener("click",()=>{

clearInterval(interval)

document.querySelector(".auto-redirect").style.opacity=".5"

})

</script>

</body>

</html>
